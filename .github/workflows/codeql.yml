name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '30 7 * * 1'

permissions:
  contents: read

jobs:
  discover:
    name: Discover top-level modules
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.set.outputs.modules }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - id: set
        # Enumerate every top-level directory that contains (directly or
        # transitively) a go.mod. Keeps the matrix self-expanding when a
        # new category directory is added.
        run: |
          mods=$(find . -mindepth 2 -maxdepth 4 -name 'go.mod' -not -path './.workingdir*/*' \
            | awk -F/ '{print $2}' | sort -u | jq -Rsc 'split("\n") | map(select(. != ""))')
          echo "modules=$mods" >> "$GITHUB_OUTPUT"

  analyze:
    name: CodeQL Analysis
    needs: discover
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.discover.outputs.modules) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: stable
      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: go
          queries: security-extended,security-and-quality
      - name: Build submodules under ${{ matrix.module }}/
        run: |
          while IFS= read -r -d '' d; do
            echo "==> $d"
            (cd "$d" && go build ./...)
          done < <(find ./${{ matrix.module }} -name 'go.mod' -printf '%h\0')
      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          category: "/language:go/category:${{ matrix.module }}"
