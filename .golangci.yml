version: "2"

linters:
  default: standard
  enable:
    # Bug detection
    - bodyclose
    - durationcheck
    - errcheck
    - errorlint
    - gosec
    - govet
    - nilerr
    - noctx
    - staticcheck

    # Style & consistency
    - godoclint
    - godot
    - misspell
    - nakedret
    - nolintlint
    - revive
    - unconvert
    - unused
    - whitespace

    # Performance
    - copyloopvar
    - intrange
    - perfsprint
    - prealloc

    # Code quality
    - errname
    - goconst
    - gocritic
    - gocyclo
    - ineffassign
    - unparam
    - wastedassign

  settings:
    godot:
      scope: toplevel
      period: true
    goconst:
      min-len: 2
      min-occurrences: 3
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
    gocyclo:
      min-complexity: 20
    misspell:
      locale: US
    nakedret:
      max-func-lines: 30
    nolintlint:
      allow-unused: false
      require-explanation: true
      require-specific: true
    revive:
      rules:
        - name: exported
          arguments:
            - "checkPrivateReceivers"
        - name: indent-error-flow
        - name: unused-parameter
        - name: unused-receiver

  exclusions:
    presets:
      - std-error-handling
      - common-false-positives
    rules:
      - path: (.+)_test\.go
        linters:
          - goconst
          - errcheck
          - gosec
      - path: doc\.go
        linters:
          - godoclint

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/lusoris/goenvoy
